spring:
  application:
    name: Lovable

  datasource:
    url: jdbc:postgresql://localhost:9010/pgvector-test?TimeZone=Asia/Kolkata
    username: ${DB_USERNAME:user} #postgres
    password: ${DB_PASSWORD:password} #root
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        jdbc:
          time_zone: Asia/Kolkata

  data:
    redis:
      host: localhost
      port: 6380

  ai:
    openai:
      api-key: ${OPENAI_API_KEY}
      base-url: https://openrouter.ai/api
      chat:
        options:
          model: openrouter/free
          temperature: 0.0  # Adjust as needed for creativity (0.0 = deterministic, higher values = more creative)
jwt:
  secret-key: ${JWT_SECRET_KEY}


stripe:
  api:
    secret: ${STRIPE_SECRET_KEY}
  webhook:
    secret: ${STRIPE_WEBHOOK_SECRET}

client:
  url: http://localhost:8000

logging:
  level:
    org.springframework.ai:
      chat.client: DEBUG

minio:
  url: http://localhost:9000          # or minio:9000 if inside docker network
  access-key: ${MINIO_ACCESS_KEY:minioadmin}
  secret-key: ${MINIO_SECRET_KEY:minioadmin123}
  project-bucket: projects
